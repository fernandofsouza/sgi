# ============================================================
# Profile: heroku
# Ativado automaticamente pelo Procfile via --spring.profiles.active=heroku
# ============================================================

spring:

  # ── Banco de dados ──────────────────────────────────────────────────────────
  # O Heroku Postgres injeta DATABASE_URL no formato:
  #   postgres://usuario:senha@host:5432/banco
  # O Spring Boot não lê esse formato diretamente; usamos a variável
  # SPRING_DATASOURCE_URL que o Heroku também expõe no formato JDBC,
  # ou configuramos a conversão abaixo.
  datasource:
    # Heroku expõe JDBC_DATABASE_URL automaticamente quando o add-on Postgres
    # está provisionado. Essa é a forma mais simples de conectar.
    url: ${JDBC_DATABASE_URL}
    username: ${JDBC_DATABASE_USERNAME}
    password: ${JDBC_DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5          # Plano gratuito Heroku Postgres tem limite de 20 conexões
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000

  # ── JPA / Hibernate ─────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate            # Flyway gerencia o schema; Hibernate só valida
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        # PostgreSQL não suporta NVARCHAR; mapear para VARCHAR automaticamente
        jdbc:
          lob:
            non_contextual_creation: true

  # ── Flyway ──────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # Flyway detecta PostgreSQL automaticamente pelo driver

  # ── Azure Entra ID ───────────────────────────────────────────────────────────
  # Desabilitado por padrão no Heroku; habilite configurando os Config Vars
  cloud:
    azure:
      active-directory:
        enabled: ${ENTRA_ID_ENABLED:false}
        tenant-id: ${AZURE_TENANT_ID:}
        app-id-uri: ${AZURE_APP_ID_URI:}
        credential:
          client-id: ${AZURE_CLIENT_ID:}
          client-secret: ${AZURE_CLIENT_SECRET:}

# ── Servidor ─────────────────────────────────────────────────────────────────
# A porta é injetada pelo Procfile via -Dserver.port=$PORT
server:
  servlet:
    context-path: /api

# ── CORS ─────────────────────────────────────────────────────────────────────
# Configure com a URL real do frontend Heroku após o deploy
# Ex: https://sgi-frontend.herokuapp.com
sgi:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  jwt:
    # Só usado quando ENTRA_ID_ENABLED=true. Sem valor default para evitar
    # que o Spring Boot tente conectar ao OIDC endpoint na inicialização.
    issuer-uri: ${JWT_ISSUER_URI:}

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      # Probes de liveness/readiness são específicas do Kubernetes; desabilitar no Heroku
      probes:
        enabled: false
  health:
    livenessstate:
      enabled: false
    readinessstate:
      enabled: false

# ── Logs ─────────────────────────────────────────────────────────────────────
logging:
  level:
    br.gov.sgi: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
    com.zaxxer.hikari: WARN
