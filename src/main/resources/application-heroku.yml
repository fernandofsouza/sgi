# ============================================================
# Profile: heroku
# Ativado automaticamente pelo Procfile via --spring.profiles.active=heroku
# ============================================================

spring:

  # ── Banco de dados ──────────────────────────────────────────────────────────
  # DataSource configurado programaticamente em HerokuDataSourceConfig,
  # que lê e parseia a variável DATABASE_URL injetada pelo add-on Heroku Postgres.

  # ── JPA / Hibernate ─────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate            # Flyway gerencia o schema; Hibernate só valida
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        # PostgreSQL não suporta NVARCHAR; mapear para VARCHAR automaticamente
        jdbc:
          lob:
            non_contextual_creation: true

  # ── Flyway ──────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # Flyway detecta PostgreSQL automaticamente pelo driver

  # ── Azure Entra ID ───────────────────────────────────────────────────────────
  # Desabilitado por padrão no Heroku; habilite configurando os Config Vars
  cloud:
    azure:
      active-directory:
        enabled: ${ENTRA_ID_ENABLED:false}
        tenant-id: ${AZURE_TENANT_ID:}
        app-id-uri: ${AZURE_APP_ID_URI:}
        credential:
          client-id: ${AZURE_CLIENT_ID:}
          client-secret: ${AZURE_CLIENT_SECRET:}

# ── Servidor ─────────────────────────────────────────────────────────────────
# A porta é injetada pelo Procfile via -Dserver.port=$PORT
server:
  servlet:
    context-path: /api

# ── CORS ─────────────────────────────────────────────────────────────────────
# Configure com a URL real do frontend Heroku após o deploy
# Ex: https://sgi-frontend.herokuapp.com
sgi:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  jwt:
    # Só usado quando ENTRA_ID_ENABLED=true. Sem valor default para evitar
    # que o Spring Boot tente conectar ao OIDC endpoint na inicialização.
    issuer-uri: ${JWT_ISSUER_URI:}

# ── Swagger / OpenAPI ────────────────────────────────────────────────────────
# UI: https://<app>.herokuapp.com/api/swagger-ui.html
# JSON: https://<app>.herokuapp.com/api/v3/api-docs
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      # Probes de liveness/readiness são específicas do Kubernetes; desabilitar no Heroku
      probes:
        enabled: false
  health:
    livenessstate:
      enabled: false
    readinessstate:
      enabled: false

# ── Logs ─────────────────────────────────────────────────────────────────────
logging:
  level:
    br.gov.sgi: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
    com.zaxxer.hikari: WARN
